<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>mmの謎解きログ</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>mmの謎解きログ</h1>
      <p>
        mm（@mm_syumida）の謎解きログ。<br />
        好み度や難易度は、あくまで個人的な感想です。<br />
        <br />
        ↓謎解き作ったりもしてます。<br />
        <a href="https://note.com/mm_syumida" target="_blank" rel="noopener noreferrer">
          https://note.com/mm_syumida
        </a>
      </p>
    </div>
  </header>

  <main class="container">
    <section class="controls-area">
      <div class="search-box">
        <label for="searchInput">検索</label>
        <input
          id="searchInput"
          type="search"
          placeholder="タイトルなどで検索"
          autocomplete="off"
        />
      </div>

      <div class="filter-box">
        <label for="typeFilter">Type</label>
        <select id="typeFilter">
          <option value="">すべて</option>
        </select>
      </div>

      <div class="filter-box">
        <label for="preferenceFilter">好み度</label>
        <select id="preferenceFilter">
          <option value="">すべて</option>
          <option value="10">10以上</option>
          <option value="9">9以上</option>
          <option value="8">8以上</option>
          <option value="7">7以上</option>
          <option value="6">6以上</option>
          <option value="5">5以上</option>
        </select>
      </div>

      <div class="filter-box">
        <label for="difficultyFilter">難易度</label>
        <select id="difficultyFilter">
          <option value="">すべて</option>
          <option value="10">10以上</option>
          <option value="9">9以上</option>
          <option value="8">8以上</option>
          <option value="7">7以上</option>
          <option value="6">6以上</option>
          <option value="5">5以上</option>
          <option value="4">4以上</option>
          <option value="3">3以上</option>
          <option value="2">2以上</option>
          <option value="1">1以上</option>
        </select>
      </div>

      <button id="resetButton" type="button">リセット</button>
    </section>

    <section class="summary-area">
      <div class="summary-card">
        <span class="summary-label">表示件数</span>
        <span id="visibleCount" class="summary-value">0</span>
      </div>
      <div class="summary-card">
        <span class="summary-label">総件数</span>
        <span id="totalCount" class="summary-value">0</span>
      </div>
    </section>

    <section class="table-section">
      <div class="table-scroll">
        <table id="logTable">
          <thead>
            <tr>
              <th data-key="タイトル">タイトル</th>
              <th data-key="Type">Type</th>
              <th data-key="好み度" data-type="number">好み度</th>
              <th data-key="難易度" data-type="number">難易度</th>
              <th data-key="クリア時間" data-type="number">クリア時間</th>
              <th data-key="ひとこと">ひとこと</th>
              <th data-key="URL">URL</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="7" class="loading-cell">読み込み中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
